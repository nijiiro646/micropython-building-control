<!DOCTYPE html>
<html lang="en">
<head>
<script>

    function setFn() {
        if(window.location.href!="http://192.168.4.13/mainpage.html"){
            window.location.replace("/mainpage.html");
            }
    }
</script>


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watt's Up</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fcfcfc;
            padding: 60px;
            color: #1a1a1a;
            font-size: 2rem; /* Global large font */
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .submit-style {
        background-color: green;   
        color: white;                 /* Text color */
        border: none;                 /* No border */
        padding: 20px 40px;           /* Size */
        font-size: 25px;              /* Text size */
        font-family: sans-serif;      /* Clean font */
        border-radius: 6px;           /* Rounded corners */
        cursor: pointer;              /* Pointer on hover */
        transition: background-color 0.3s ease;
    }

    .submit-style:hover {
        background-color: #90ee90;    /* Darker blue on hover */
    }

    .submit-style:active {
        background-color: black;    /* Black on click */
        transform: scale(0.97);       /* Slight press effect */
    }

        .center-wrapper {
                height: 20vh;
                display: flex;
                justify-content: center;
                align-items: center;
            }

        .temp-row {
            display: flex;
            gap: 80px;
            margin-bottom: 50px;
        }
        
        .radio-row{
            gap:40px;
            display: flex;
        }

        .temp-label {
            display: block;
            margin-bottom: 15px;
        }

        .box {
            border: 2px solid #000;
            border-radius: 10px;
            padding: 15px 25px;
            display: inline-block;
            min-width: 120px;
            text-align: center;
            font-size: 2.5rem;
        }

        input[type="number"].box {
            width: 120px;
            outline: none;
            font-family: inherit;
        }

            input[type="number"]::-webkit-outer-spin-button,
      	input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Radio Button */
        p {
            margin: 40px 0 15px 0;
            font-weight: bold;
        }


        input[type="radio"] {
            width: 30px;
            height: 30px;
            vertical-align: middle;
            cursor: pointer;
        }

        label {
            vertical-align: middle;
            cursor: pointer;
            margin-left: 5px;
        }
    </style>
</head>
<body onload="setFn()">

  <div class="imgcontainer">
    <img src="Logo.webp" width="500" alt="Watt's Up" class="Watt's Up">
  </div>


<p align="right" style="font-weight: normal; font-size: 20px;"><a href="/login.html">Login</a></p>

<div class="container">
    <form>
    <div class="temp-row">
        <div>
            <span class="temp-label">Current temperature</span>
            <div class="box">21°C</div>
        </div>
        <div>
            <span class="temp-label">Set temperature</span>
            <input type="number" name="settemp" class="box" min="18" max="25" value="%TEMP%"> <span>°C</span>
        </div>
    </div>
    <p>Light Status:</p>
    <div class="radio-row">
        <div>
            <input type="radio" id="light_on" name="light_stats" value="On" disabled>
            <label for="light_on">On</label>
        </div>
        <div>
            <input type="radio" id="light_off" name="light_stats" value="Off" disabled>
            <label for="light_off">Off</label>
        </div>
        <div>
            <input type="radio" id="light_passive" name="light_stats" value="Passive" disabled>
            <label for="light_passive">Passive</label>
        </div>
        </div>

    <p>Heat Status:</p>
    <div class="radio-row">
        <div>
            <input type="radio" id="heat_on" name="heat_stats" value="On" disabled>
            <label for="heat_on">On</label>
        </div>
        <div>
            <input type="radio" id="heat_off" name="heat_stats" value="Off" disabled>
            <label for="heat_off">Off</label>
        </div>
        <div>
            <input type="radio" id="heat_passive" name="heat_stats" value="Passive" disabled>
            <label for="heat_passive">Passive</label>
        </div>
</div>

<p>Ventilation status:</p>
<div class="radio-row">
        <div>
            <input type="radio" id="Ventilation_on" name="Ventilation_stats" value="On" disabled>
            <label for="Ventilation_on">On</label>
        </div>
        <div>
            <input type="radio" id="Ventilation_off" name="Ventilation_stats" value="Off"  disabled>
            <label for="Ventilation_off">Off</label>
        </div>
        <div>
            <input type="radio" id="Ventilation_passive" name="Ventilation_stats" value="Passive" disabled>
            <label for="Ventilation_passive">Passive</label>
        </div>
    </div>
    <p>Alarm Status:</p>
    <div class="radio-row">
        <div>
            <input type="radio" id="alarm_on" name="alarm_stats" value="On" disabled>
            <label for="alarm_on">On</label>
        </div>
        <div>
            <input type="radio" id="alarm_off" name="alarm_stats" value="Off" disabled>
            <label for="alarm_off">Off</label>
        </div>
    </div>
    <div class="center-wrapper">
  <input type="submit" value="Submit" class="submit-style" disabled>
</div>
</form>
</div>

</body>
</html>
